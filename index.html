<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe</h1>

    <div class="scoreboard">
      <div class="score" id="score-x">
        <span class="player-label x">X</span>
        <span class="score-value" id="x-wins">0</span>
      </div>
      <div class="score draws">
        <span class="player-label">Draws</span>
        <span class="score-value" id="draws">0</span>
      </div>
      <div class="score" id="score-o">
        <span class="player-label o">O</span>
        <span class="score-value" id="o-wins">0</span>
      </div>
    </div>

    <div class="status" id="status">Player X's turn</div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
      <button id="restart-btn">New Game</button>
      <button id="reset-score-btn">Reset Scores</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
